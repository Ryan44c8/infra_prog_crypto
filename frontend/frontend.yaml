apiVersion: apps/v1
kind: Deployment
metadata:
  name: crypto-frontend
  namespace: infra-prog-crypto
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crypto-frontend
  template:
    metadata:
      labels:
        app: crypto-frontend
    spec:
      containers:
        - name: crypto-frontend
          image: ghcr.io/USERNAME/crypto-test:latest
   # Remplace USERNAME par ton compte GHCR
          ports:
            - containerPort: 80
          env:
            - name: SITE_TITLE
              value: "Infra Prog Crypto"
---
apiVersion: v1
kind: Service
metadata:
  name: crypto-frontend-service
  namespace: infra-prog-crypto
spec:
  selector:
    app: crypto-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
